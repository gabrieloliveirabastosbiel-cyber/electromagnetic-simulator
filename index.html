<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electromagnetic Induction Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        canvas {
            border: 1px solid black;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Electromagnetic Induction Simulator</h1>
    <p>This simulator demonstrates the basic principle of electromagnetic induction.</p>
    <label for="coilResistance">Coil Resistance (Ohms):</label>
    <input type="number" id="coilResistance" value="10"><br>
    <label for="magneticField">Magnetic Field Strength (Tesla):</label>
    <input type="number" id="magneticField" value="0.5"><br>
    <button id="simulate">Simulate</button>
    <canvas id="simulationCanvas" width="600" height="400"></canvas>
    <script>
        document.getElementById('simulate').onclick = function() {
            const coilResistance = document.getElementById('coilResistance').value;
            const magneticField = document.getElementById('magneticField').value;
            simulateInduction(coilResistance, magneticField);
        };

        function simulateInduction(resistance, field) {
            const canvas = document.getElementById('simulationCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Simulation logic goes here
            ctx.fillStyle = 'blue';
            ctx.fillRect(100, 100, 150, 150);
            ctx.fillStyle = 'black';
            ctx.fillText(`Resistor: ${resistance} Ohms`, 100, 90);
            ctx.fillText(`Magnetic Field: ${field} Tesla`, 100, 270);
        }
    </script>
</body>
</html>
